name: Build Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify dependency lock
        run: git diff --exit-code pubspec.lock

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Test Functions
        run: npm test --prefix functions

      - name: Lint Functions
        run: npm run lint --prefix functions
